server {
    server_name sm.aeseo1.org www.sm.aeseo1.org;

    # Logs
    access_log /var/log/nginx/sitemap_access.log;
    error_log /var/log/nginx/sitemap_error.log;

    # Frontend - Serve static files
    root /var/www/sitemap-crawler/frontend/dist;
    index index.html;

    # Max body size for large requests
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ============================================
    # SSE Streaming Endpoint (CRITICAL for real-time)
    # MUST BE BEFORE /api/ location block
    # ============================================
    location /api/crawl-stream {
        # Proxy to Flask backend (port 8000, NOT 5000)
        proxy_pass http://127.0.0.1:8000;

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # *** SSE CRITICAL SETTINGS ***
        # Disable buffering (MUST HAVE for SSE)
        proxy_buffering off;

        # Disable caching
        proxy_cache off;

        # Keep connection alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Extended timeouts for long-running streams
        proxy_connect_timeout 3600s;  # 1 hour
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # SSE specific headers
        proxy_set_header X-Accel-Buffering no;  # Disable nginx buffering

        # Content type for SSE
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Accel-Buffering "no";
    }

    # ============================================
    # Backend API (Flask on port 8000)
    # ============================================
    location /api/ {
        # Proxy to Flask backend (port 8000, NOT 5000)
        proxy_pass http://127.0.0.1:8000;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering for real-time responses
        proxy_buffering off;

        # HTTP/1.1 for keep-alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============================================
    # Frontend (React SPA)
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Health check endpoint (no auth required)
    location /api/health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        access_log off;  # Don't log health checks
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sm.aeseo1.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sm.aeseo1.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = sm.aeseo1.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name sm.aeseo1.org www.sm.aeseo1.org;
    return 404; # managed by Certbot
}
